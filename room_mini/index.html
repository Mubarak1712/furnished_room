<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Room Furnishing Visualizer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>🏠 Room Furnishing Visualizer</h1>
  <p>Design your dream room within budget</p>
</header>

<section class="budget-box">
  <label>Budget (₹)</label>
  <input type="number" id="budgetInput" value="100000">
  <button onclick="setBudget()">Apply Budget</button>

  <div class="money">
    <span>Budget: ₹<b id="budget">100000</b></span>
    <span>Total: ₹<b id="total">0</b></span>
  </div>
</section>

<div class="main">

  <!-- STORE -->
  <aside class="store">
    <h2>🛒 Furniture Store</h2>

    <button onclick="addItem('images/sofas/sofa1.png',18000)">Sofa – ₹18,000</button>
    <button onclick="addItem('images/beds/bed1.png',28000)">Bed – ₹28,000</button>
    <button onclick="addItem('images/chairs/chair1.png',9000)">Chair – ₹9,000</button>
    <button onclick="addItem('images/lamps/lamp1.png',2000)">Lamp – ₹2,000</button>
    <button onclick="addItem('images/paints/paint1.png',3000)">Painting – ₹3,000</button>

    <button class="auto" onclick="autoLayout()">✨ Auto Best Layout</button>
  </aside>

  <!-- ROOM -->
  <section class="room" id="room">
    <img src="images/empty_room.jpg" class="room-bg">
  </section>

</div>

<script src="js/app.js"></script>
</body>
</html>
